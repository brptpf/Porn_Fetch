# yamllint disable rule:line-length
# yamllint disable rule:indentation
# yamllint disable rule:comments-indentation
---
- module-name: "av"
  implicit-imports:
    - depends:
        - "av.container.input"
        - "av.container.output"
        - "av.packet"
        - "av.stream"
        - "av.audio.stream"
        - "av.audio.resampler"
        - "uuid"

  data-files:
    - patterns:
        - "container/*.so"
        - "audio/*.so"
